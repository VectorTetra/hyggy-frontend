	<!-- 4. Компонент, шапка головної сторінки сайту -->

	<!-- 5. Компонент, шапка головної сторінки сайту -->

	<!-- 6. Компонент, шапка головної сторінки сайту -->

<!-- =================================Головна сторінка (бордер)============================ -->

<script type="text/babel" src="./jsx-Border/MainPageBorder.jsx"></script>


<!-- ================================= Головна сторінка (body)================================ -->
	<!-- 0. Компонент, Головна сторінка -->
	<script type="text/babel" src="./jsx-Body/MainPageBody.jsx"></script>
	<!-- 1. Компонент, Головна сторінка -->
	<script type="text/babel" src="./jsx-Body/MainPageBodySale.jsx"></script>

	<!-- 3. Компонент, Головна сторінка -->

	<!-- 5. Компонент, Головна сторінка -->

<!-- ===================================Футер (Footer)================================== -->
<!-- 0. Компонент, Футер -->
<script type="text/babel" src="./jsx-Footer/MainPageFooter.jsx"></script>
<!-- 1. Компонент, Футер -->
<script type="text/babel" src="./jsx-Footer/MainPageFooterList.jsx"></script>
<!-- 2. Компонент, Футер -->

<!-- 3. Компонент, Футер -->
<script type="text/babel" src="./jsx-Footer/MainPageFooterAddress.jsx"></script>

<!-- ================== =============== ОСНОВНИЙ СКРИПТ РЕНДЕРУ ========== ====================== -->

    <script type="text/babel">
		let headerData;
		let borderData;
		let bodyData;
		let bodyFooter;
		Promise.all([
			fetch('./json/mainPageHeaderInfo.json').
			then(resp => resp.json()).
			then((data => {
				//=======================> Reading header data from JSON file <================================
				headerData = data.headerData; 
			})),
			fetch('./json/mainPageBorder.json').
			then(resp => resp.json()).
			then((data => {
				//=======================> Reading border data from JSON file <================================
				borderData = data.borderData; 
			})),
			fetch('./json/mainPageBody.json').
			then(resp => resp.json()).
			then((data => {
				//=======================> Reading border data from JSON file <================================
				bodyData = data.bodyData; 
			})),
			fetch('./json/mainPageFooter.json').
			then(resp => resp.json()).
			then((data => {
				//=======================> Reading border data from JSON file <================================
				footerData = data.footerData; 
			})),
		]).then(
		()=>{
				const rootNode = document.getElementById("app");    
				const root = ReactDOM.createRoot(rootNode);
				root.render(
					<React.StrictMode>
						<div>
							<MainPageHeader headerData={headerData}/>
							<MainPageBorder borderData={borderData}/>
							<MainPageBody bodyData={bodyData}/>
							<MainPageFooter footerData={footerData}/>
						</div>
					</React.StrictMode> 
				);
			}
		)
    </script>
</body>
